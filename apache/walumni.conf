<VirtualHost *:80>
    ServerName localhost
    ServerAdmin webmaster@localhost
    
    # IMPORTANTE: O caminho interno no container
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/walumni-error.log
    CustomLog ${APACHE_LOG_DIR}/walumni-access.log combined
</VirtualHost>
