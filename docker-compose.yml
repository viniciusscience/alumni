services:
  web:
    build: .
    container_name: walumni_server
    ports:
      - "80:80"
    volumes:
      - ./walumni:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/php.ini
      - ./apache/:/etc/apache2/sites-enabled/
      
    depends_on:
      - wdb
    networks:
      - walumni-network

  # Banco de Dados
  wdb:
    image: mysql:8.0
    container_name: walumni_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: user
      MYSQL_PASSWORD: user123
    ports:
      - "3306:3306"
    volumes:
      - db:/var/lib/mysql
      - ./mysql:/etc/mysql/conf.d/
    networks:
      - walumni-network
  

networks:
  walumni-network:
    driver: bridge

volumes:
    db: